version: '3.8'

services:
  db:
    image: mariadb:11.7.2
    container_name: gbg_db
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: go_baby_go
    ports:
      - "3306:3306"
    volumes:
      # Montar esquema de inicialización de la BD
      - ./back/schema.sql:/docker-entrypoint-initdb.d/init.sql
      # Opcional: Persistencia de datos
      - db_data:/var/lib/mysql

  backend:
    build: 
      context: ./back
      dockerfile: Dockerfile
    container_name: gbg_backend
    ports:
      - "8001:8001"
    environment:
      # Conexión SQLAlchemy (driver mysql+mysqlconnector)
      DATABASE_URL: mysql+mysqlconnector://root:rootpassword@db:3306/go_baby_go
    depends_on:
      - db

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: gbg_frontend
    ports:
      - "5173:5173"
    environment:
      # Le decimos a vite en qué puerto mapear la red interna
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend

volumes:
  db_data:
