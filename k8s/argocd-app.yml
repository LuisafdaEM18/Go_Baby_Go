apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: go-baby-go-app
  namespace: argocd
  labels:
    app: go-baby-go-app
spec:
  project: default
  source:
    repoURL: 'https://github.com/LuisafdaEM18/Go_Baby_Go.git'
    targetRevision: HEAD
    path: k8s
    # Si tienes subdirectorios y quieres sincronizar de forma recursiva
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
